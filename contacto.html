<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecnologías - hago lo que puedo</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <header>
        <h1>Tecnologías(o algo asi)</h1>
        <p>Tu tecnología al mejor precio🕊️</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="productos.html">Productos</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <main>
        <section class="formulario-contacto">
            <h2>Dejanos tu Consulta</h2>
            <p>¿Dudas? Completá el formulario y eventualmente te responderemos</p>

            <form class="mi-formulario" action="#" method="POST">
                
                <div class="grupo-campo">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ejemplo: Elián" required>
                </div>

                <div class="grupo-campo">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="persona@correo.com" required>
                </div>

                <div class="grupo-campo">
                    <label for="motivo">Motivo de la consulta:</label>
                    <select id="motivo" name="motivo">
                        <option value="presupuesto">Presupuesto</option>
                        <option value="soporte">Soporte</option>
                        <option value="stock">Duda del Stock</option>
                        <option value="otro">Otro motivo</option>
                    </select>
                </div>

                <div class="grupo-campo">
                    <label for="mensaje">Tu Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="6" placeholder="mas detalles..." required></textarea>
                </div>

                <div class="grupo-campo">
                    <button type="submit" class="boton-enviar">Enviar Mensaje </button>
                </div>

            </form>
            </section>
    </main>

    <footer>
        <p>creado por Elián</p>
    </footer>

</body>
</html>
